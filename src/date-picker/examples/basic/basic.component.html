<thy-form-group thyLabelText="时间单位" thyLabelRequired>
  <thy-custom-select
    name="dateDimensionUnit"
    class="d-block w-50 mb-3"
    required
    [(ngModel)]="dateUnit"
    [thyAllowClear]="false"
    thyPlaceHolder="选择时间单位"
    (ngModelChange)="selectDateUnit()">
    <thy-option *ngFor="let item of dateUnitOptions" [thyValue]="item.key" [thyLabelText]="item.name"></thy-option>
  </thy-custom-select>
</thy-form-group>

<thy-form-group thyLabelText="动态时间选择器">
  <thy-range-picker
    class="d-block w-50 mb-3"
    [(ngModel)]="dynamicDateRange"
    [thyShowShortcut]="true"
    [thyShortcutPresets]="dynamicShortcutPresets"
    (ngModelChange)="onChange($event)"
    (thyShortcutValueChange)="shortcutValueChange($event)"
    [thyMode]="dateUnit"
    [thyAllowClear]="isAllowClear"></thy-range-picker>
</thy-form-group>
