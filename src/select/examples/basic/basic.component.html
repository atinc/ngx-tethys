单选：
<thy-select [(ngModel)]="value1" [thyAllowClear]="true" (ngModelChange)="onModelChange($event)" [thyShowSearch]="true">
  @for (option of listOfOption; track option.value) {
    <thy-option [thyValue]="option.value" [thyLabelText]="option.text"> </thy-option>
  }
</thy-select>
<br />
多选：
<thy-select
  [(ngModel)]="value2"
  [thyAllowClear]="true"
  (ngModelChange)="onModelChange($event)"
  [thyMode]="'multiple'"
  [thyShowSearch]="true">
  @for (option of listOfOption; track option.value) {
    <thy-option [thyValue]="option.value" [thyLabelText]="option.text"> </thy-option>
  }
</thy-select>
