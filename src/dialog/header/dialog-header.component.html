@if (headerTemplate()) {
  <template [ngTemplateOutlet]="headerTemplate()"></template>
} @else {
  <h3 class="dialog-title d-flex align-items-center">
    @if (iconName()) {
      <thy-icon class="mr-2" [thyIconName]="iconName()" [style.color]="iconColor()"></thy-icon>
    }
    <span>{{ title() }}</span>
  </h3>
  <a href="javascript:;" class="mr-n2" thyAction thyActionIcon="close" (click)="close($event)"></a>
}
