version: 2.1
orbs:
  browser-tools: circleci/browser-tools@1.4.3
jobs:
  build:
    working_directory: ~/ngx-tethys
    docker:
      - image: cimg/node:20.12.2-browsers
    environment:
      LANG: 'zh_CN.UTF-8'
      LC_ALL: 'zh_CN.UTF-8'
      LANGUAGE: 'zh_CN:zh'
      TZ: 'Asia/Shanghai'
    steps:
      - browser-tools/install-chrome
      - checkout
      - run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8 LC_ALL=zh_CN.UTF-8 LANGUAGE=zh_CN:zh
          locale
          node --version
          google-chrome --version
          which google-chrome
      - restore_cache:
          key: ngx-tethys-{{ .Branch }}-{{ checksum "pnpm-lock.yaml" }}
      - run: corepack enable && pnpm install --frozen-lockfile
      - save_cache:
          key: ngx-tethys-{{ .Branch }}-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - 'node_modules'
      - run: pnpm run lint
      - run: pnpm run test-tethys --no-watch --no-progress --browsers=ChromeHeadlessCI --source-map=false
      - run: pnpm run test-cdk --no-watch --no-progress --browsers=ChromeHeadlessCI --source-map=false
      - run: pnpm run test-schematics
